<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestão de Obra{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

  <nav class="bg-slate-900 text-white shadow-lg print:hidden">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 font-bold text-lg tracking-tight">
        🏗️ <span>Gestão de Obra</span>
      </a>
      <div class="flex items-center gap-4 text-sm">
        <a href="/" class="text-slate-300 hover:text-white transition">Dashboard</a>
      </div>
    </div>
  </nav>

  <main class="max-w-screen-xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
