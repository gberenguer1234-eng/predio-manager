# Configuração Fly.io — Gestão de Obra
app = "predio-manager-obra"
primary_region = "gru"

[build]

[env]
  PORT    = "8080"
  DB_PATH = "/data/predio.db"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source      = "predio_data"
  destination = "/data"
  initial_size = "1gb"
